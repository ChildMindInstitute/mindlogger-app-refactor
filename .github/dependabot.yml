version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[GHA] Dependabot:"
      prefix-development: "[GHA-dev] Dependabot:"
    pull-request-branch-name:
      separator: "-"
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: "[npm] Dependabot:"
      prefix-development: "[npm-dev] Dependabot:"
    pull-request-branch-name:
      separator: "-"
